version: '3.8'

x-airflow-common: &airflow-common
  build: . # Demande à Docker de construire l'image via le Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
  volumes:
    - ./dags:/opt/airflow/dags
    - .:/opt/airflow/scripts
  depends_on:
    - postgres

services:
  # 1. DATA LAKE (MINIO)
  minio:
    image: minio/minio
    container_name: datalake_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin_projet
      MINIO_ROOT_PASSWORD: password_secure123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 2. BASE DE DONNEES D'AIRFLOW
  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. INITIALISATION
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: version
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin

  # 4. INTERFACE WEB
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  # 5. SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

  # 6. DATA WAREHOUSE
  data_warehouse:
    image: postgres:15
    container_name: data_warehouse_db
    environment:
      - POSTGRES_USER=admin_dw
      - POSTGRES_PASSWORD=password_dw
      - POSTGRES_DB=presse_dw
    ports:
      - "5433:5432" 
    volumes:
      - dw_data:/var/lib/postgresql/data

  # 7. METABASE
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_dashboard
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase.db

volumes:
  minio_data:
  postgres_data:
  dw_data:
  metabase_data: